<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Roboto', sans-serif;
      color: #334155;
      text-align: center;
      position: relative;
    }

    /* Wave */
    .wave {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: auto;
      z-index: -1;
      animation: waveFade 1.2s ease forwards;
    }

    @keyframes waveFade {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Top-Bar */
    .top-bar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      z-index: 100;
      animation: slideDownCenter 0.6s ease 0.2s both;
    }

    @keyframes slideDownCenter {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Dropdown */
    .dropdown { position: relative; }

    .dropbtn {
      background-color: #e2e8f0;
      color: #0f172a;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .dropbtn:hover {
      background: linear-gradient(90deg, #38bdf8, #8b5cf6);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 6px 10px rgba(0,0,0,0.15);
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      background-color: #e2e8f0;
      text-align: center;
      padding: 15px 0;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      border-radius: 12px;
      z-index: 10;
    }

    .dropdown-content.open {
      animation: dropIn 0.25s ease forwards;
    }

    @keyframes dropIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .dropdown-content a {
      display: block;
      color: #0f172a;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      padding: 10px 0;
      transition: background 0.3s, color 0.3s;
    }

    .dropdown-content a:hover {
      background: linear-gradient(90deg, #38bdf8, #8b5cf6);
      color: white;
    }

    /* TikTok */
    .social_icons {
      position: fixed;
      top: 16px;
      right: 45px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      animation: slideDown 0.6s ease 0.4s both;
      z-index: 200;
    }

    .social_icons a {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border-radius: 14px;
      transition: background 0.2s;
    }

    .social_icons a:hover { background: rgba(0,0,0,0.06); }

    .social_icon {
      width: 40px;
      height: 40px;
      transition: transform 0.3s ease;
    }

    .social_icon:hover { transform: scale(1.15) rotate(-5deg); }

    .social-name {
      font-size: 0.7rem;
      color: #64748b;
      white-space: nowrap;
    }

    /* Hero */
    .center-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 0 40px;
    }

    h1 {
      font-size: 4rem;
      background: linear-gradient(90deg, #38bdf8, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: #8b5cf6; /* Fallback */
      background-clip: text;
      margin: 0 0 20px 0;
      line-height: 1.2;
      transition: transform 0.3s ease;
      opacity: 0;
      animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards;
    }

    h1:hover { transform: scale(1.05); }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    p {
      font-size: 1.2rem;
      max-width: 600px;
      line-height: 1.6;
      margin: 0 0 30px 0;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.9s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Floating Orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
      animation: float 8s ease-in-out infinite;
    }

    .orb1 {
      width: 300px; height: 300px;
      background: rgba(56, 189, 248, 0.15);
      top: 10%; left: 5%;
      animation-delay: 0s;
    }

    .orb2 {
      width: 250px; height: 250px;
      background: rgba(139, 92, 246, 0.15);
      bottom: 15%; right: 8%;
      animation-delay: -3s;
    }

    .orb3 {
      width: 180px; height: 180px;
      background: rgba(56, 189, 248, 0.1);
      bottom: 30%; left: 20%;
      animation-delay: -5s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-30px) scale(1.05); }
    }

    /* Partikel Canvas */
    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Pfeil nach oben */
    #scrollTop {
      position: fixed;
      bottom: 30px;
      right: 40px;
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #38bdf8, #8b5cf6);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(139, 92, 246, 0.4);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }

    #scrollTop.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    #scrollTop:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.5);
    }

    #scrollTop svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .dropbtn { padding: 10px 22px; font-size: 0.95rem; }
      .dropdown-content { width: 160px; }
      h1 { font-size: 2.6rem; }
      p  { font-size: 0.95rem; padding: 0 10px; }
      .social_icons { right: 14px; top: 14px; gap: 4px; }
      .social_icon  { width: 32px; height: 32px; }
      .social-name  { font-size: 0.6rem; }
      #scrollTop    { bottom: 20px; right: 20px; width: 40px; height: 40px; }
      .orb1 { width: 180px; height: 180px; }
      .orb2 { width: 150px; height: 150px; }
      .orb3 { width: 100px; height: 100px; }
    }

    @media (max-width: 400px) {
      h1 { font-size: 2rem; }
      p  { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <!-- Floating Orbs -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <img class="wave" src="img/wave (4).svg" alt="" />

  <!-- Dropdown Menü -->
  <div class="top-bar">
    <div class="dropdown">
      <button class="dropbtn" id="dropbtn">Menü</button>
      <div class="dropdown-content" id="dropdown-content">
        <a href="index.html">Home</a>
        <a href="todo.html">To-Do Liste</a>
        <a href="aboutme.html">Über Mich</a>
        <a href="impressum.html">Impressum</a>
      </div>
    </div>
  </div>

  <!-- TikTok Icon -->
  <div class="social_icons">
    <a href="https://www.tiktok.com/@lucapicasso0" target="_blank">
      <img class="social_icon" src="img/tiktok-brands-solid-full.svg" alt="TikTok Logo" />
    </a>
    <span class="social-name">@lucapicasso0</span>
  </div>

  <!-- Partikel Canvas -->
  <canvas id="particles"></canvas>

  <!-- Inhalt -->
  <div class="center-content">
    <h1>Herzlich <br />Willkommen</h1>
    <p>Moin, ich bin Luca und erstelle meine erste Website</p>
  </div>

  <!-- Pfeil nach oben -->
  <button id="scrollTop" title="Nach oben">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 4l-8 8h5v8h6v-8h5z"/>
    </svg>
  </button>

  <script>
    // ── Dropdown ──
    const btn  = document.getElementById('dropbtn');
    const menu = document.getElementById('dropdown-content');

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = menu.classList.contains('open');
      if (isOpen) {
        menu.classList.remove('open');
        menu.style.display = 'none';
      } else {
        menu.style.display = 'block';
        menu.classList.add('open');
      }
    });

    window.addEventListener('click', () => {
      menu.classList.remove('open');
      menu.style.display = 'none';
    });

    // ── Scroll-to-Top ──
    const scrollTopBtn = document.getElementById('scrollTop');

    window.addEventListener('scroll', () => {
      scrollTopBtn.classList.toggle('visible', window.scrollY > 100);
    });

    scrollTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ── Sterne / Partikel ──
    const canvas = document.getElementById('particles');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', () => {
      resize();
      // Sternpositionen nach Resize neu setzen damit keine Lücken entstehen
      stars.forEach(s => {
        s.x = Math.random() * canvas.width;
        s.y = Math.random() * canvas.height;
      });
    });

    const COUNT = 120;

    const stars = Array.from({ length: COUNT }, () => ({
      x:       Math.random() * window.innerWidth,
      y:       Math.random() * window.innerHeight,
      r:       Math.random() * 1.8 + 0.5,
      alpha:   Math.random(),
      speed:   Math.random() * 0.02 + 0.005,
      growing: Math.random() > 0.5,
      dy:      (Math.random() * 0.3 + 0.1) * (Math.random() > 0.5 ? 1 : -1),
      dx:      Math.random() * 0.15,
    }));

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const s of stars) {
        // Funkeln
        if (s.growing) {
          s.alpha += s.speed;
          if (s.alpha >= 1) s.growing = false;
        } else {
          s.alpha -= s.speed;
          if (s.alpha <= 0.05) s.growing = true;
        }

        // Schweben
        s.y += s.dy * 0.3;
        s.x += s.dx * 0.2;
        if (s.y < 0)            s.y = canvas.height;
        if (s.y > canvas.height) s.y = 0;
        if (s.x > canvas.width)  s.x = 0;

        // Zeichnen mit Glühen
        ctx.save();
        ctx.globalAlpha = s.alpha;

        const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 4);
        glow.addColorStop(0, 'rgba(180, 160, 255, 0.8)');
        glow.addColorStop(1, 'rgba(100, 180, 255, 0)');
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 4, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = 'white';
        ctx.fill();

        ctx.restore();
      }

      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
